<svg viewBox="0 0 900 40" xmlns="http://www.w3.org/2000/svg" width="900" height="40">
  <defs>
    <radialGradient id="divGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#cc0000" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="900" height="40" fill="#000000"/>

  <!-- Central glow -->
  <ellipse cx="450" cy="20" rx="200" ry="12" fill="url(#divGlow)">
    <animate attributeName="rx" values="200;240;200" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.8;1;0.8" dur="3s" repeatCount="indefinite"/>
  </ellipse>

  <!-- Left line -->
  <line x1="0" y1="20" x2="380" y2="20" stroke="#cc0000" stroke-width="0.8" opacity="0.4"/>
  <!-- Right line -->
  <line x1="520" y1="20" x2="900" y2="20" stroke="#cc0000" stroke-width="0.8" opacity="0.4"/>

  <!-- Center diamond cluster -->
  <g transform="translate(450,20)">
    <polygon points="0,-6 6,0 0,6 -6,0" fill="#cc0000" opacity="0.8">
      <animate attributeName="opacity" values="0.8;1;0.8" dur="2s" repeatCount="indefinite"/>
    </polygon>
    <polygon points="0,-3 3,0 0,3 -3,0" fill="#ff2200"/>
    <polygon points="-20,-4 -16,0 -20,4 -24,0" fill="none" stroke="#cc0000" stroke-width="1" opacity="0.5"/>
    <polygon points="20,-4 24,0 20,4 16,0" fill="none" stroke="#cc0000" stroke-width="1" opacity="0.5"/>
  </g>

  <!-- Tick marks -->
  <g stroke="#cc0000" stroke-width="0.8" opacity="0.3">
    <line x1="350" y1="16" x2="350" y2="24"/>
    <line x1="320" y1="17" x2="320" y2="23"/>
    <line x1="290" y1="18" x2="290" y2="22"/>
    <line x1="550" y1="16" x2="550" y2="24"/>
    <line x1="580" y1="17" x2="580" y2="23"/>
    <line x1="610" y1="18" x2="610" y2="22"/>
  </g>

  <!-- Animated pulse along lines -->
  <circle r="2" fill="#ff2200" opacity="0.8">
    <animateMotion dur="4s" repeatCount="indefinite" path="M 0,20 L 380,20"/>
    <animate attributeName="opacity" values="0;1;0" dur="4s" repeatCount="indefinite"/>
  </circle>
  <circle r="2" fill="#ff2200" opacity="0.8">
    <animateMotion dur="4s" begin="2s" repeatCount="indefinite" path="M 900,20 L 520,20"/>
    <animate attributeName="opacity" values="0;1;0" dur="4s" begin="2s" repeatCount="indefinite"/>
  </circle>
</svg>
