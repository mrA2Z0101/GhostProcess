<svg viewBox="0 0 900 308" xmlns="http://www.w3.org/2000/svg" width="900" height="308">
  <defs>
    <radialGradient id="sBg" cx="50%" cy="40%" r="80%">
      <stop offset="0%" stop-color="#0a0000"/>
      <stop offset="100%" stop-color="#000000"/>
    </radialGradient>
    <filter id="sGlow">
      <feGaussianBlur stdDeviation="2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="900" height="308" fill="url(#sBg)"/>

  <!-- Scanline -->
  <rect x="0" y="0" width="900" height="1.5" fill="#ff0000" opacity="0.07">
    <animateTransform attributeName="transform" type="translate" values="0,0;0,308;0,0" dur="6s" repeatCount="indefinite"/>
  </rect>

  <!-- Section header -->
  <rect x="0" y="0" width="900" height="38" fill="#0d0000"/>
  <line x1="0" y1="38" x2="900" y2="38" stroke="#cc0000" stroke-width="1" opacity="0.6"/>
  <text x="30" y="25" font-family="'Courier New', monospace" font-size="16" font-weight="bold" fill="#ff2200" filter="url(#sGlow)">▸ PROJECT STRUCTURE  &amp;  REQUIREMENTS</text>
  <circle cx="16" cy="19" r="4" fill="#ff2200">
    <animate attributeName="opacity" values="1;0.2;1" dur="1.5s" repeatCount="indefinite"/>
  </circle>

  <!-- ═══ LEFT: File tree panel ═══ -->
  <rect x="30" y="50" width="415" height="245" rx="5" fill="#060000" stroke="#330000" stroke-width="1"/>
  <!-- Title bar -->
  <rect x="30" y="50" width="415" height="24" rx="5" fill="#110000"/>
  <rect x="30" y="63"  width="415" height="11"  fill="#110000"/>
  <circle cx="50"  cy="62" r="4" fill="#cc0000" opacity="0.6"/>
  <circle cx="66"  cy="62" r="4" fill="#440000" opacity="0.6"/>
  <circle cx="82"  cy="62" r="4" fill="#220000" opacity="0.6"/>
  <text x="237" y="67" text-anchor="middle" font-family="monospace" font-size="9" fill="#440000">file tree</text>

  <!-- File tree content — all visible immediately -->
  <g transform="translate(50, 84)">
    <text x="0"   y="18" font-family="'Courier New', monospace" font-size="12" fill="#ff4444">GhostProcess/</text>

    <text x="0"   y="38" font-family="'Courier New', monospace" font-size="12" fill="#888888">├──</text>
    <text x="38"  y="38" font-family="'Courier New', monospace" font-size="12" fill="#ff6666">GhostProcess.py</text>
    <text x="228" y="38" font-family="'Courier New', monospace" font-size="10" fill="#444444">← main app</text>

    <text x="0"   y="56" font-family="'Courier New', monospace" font-size="12" fill="#888888">├──</text>
    <text x="38"  y="56" font-family="'Courier New', monospace" font-size="12" fill="#ff4444">assets/</text>

    <text x="0"   y="74" font-family="'Courier New', monospace" font-size="12" fill="#888888">│   └──</text>
    <text x="70"  y="74" font-family="'Courier New', monospace" font-size="12" fill="#888888">ghostprocess_logo.png</text>

    <text x="0"   y="92" font-family="'Courier New', monospace" font-size="12" fill="#888888">├──</text>
    <text x="38"  y="92" font-family="'Courier New', monospace" font-size="12" fill="#cc4444">README.md</text>

    <text x="0"   y="110" font-family="'Courier New', monospace" font-size="12" fill="#888888">└──</text>
    <text x="38"  y="110" font-family="'Courier New', monospace" font-size="12" fill="#cc4444">requirements.txt</text>

    <line x1="0" y1="126" x2="360" y2="126" stroke="#220000" stroke-width="1"/>

    <text x="0"   y="144" font-family="'Courier New', monospace" font-size="10" fill="#444444">Config: ~/.suspicious_process_scanner/</text>
    <text x="0"   y="160" font-family="'Courier New', monospace" font-size="10" fill="#333333">├── ui_config.json</text>
    <text x="170" y="160" font-family="'Courier New', monospace" font-size="10" fill="#2a2a2a">← settings</text>
    <text x="0"   y="176" font-family="'Courier New', monospace" font-size="10" fill="#333333">└── baseline.json</text>
    <text x="170" y="176" font-family="'Courier New', monospace" font-size="10" fill="#2a2a2a">← drift detection</text>

    <!-- Blinking cursor -->
    <rect x="0" y="184" width="7" height="11" fill="#cc0000">
      <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/>
    </rect>
  </g>

  <!-- ═══ RIGHT: Requirements panel ═══ -->
  <rect x="465" y="50" width="415" height="245" rx="5" fill="#060000" stroke="#330000" stroke-width="1"/>
  <!-- Title bar -->
  <rect x="465" y="50" width="415" height="24" rx="5" fill="#110000"/>
  <rect x="465" y="63"  width="415" height="11"  fill="#110000"/>
  <circle cx="485" cy="62" r="4" fill="#cc0000" opacity="0.6"/>
  <circle cx="501" cy="62" r="4" fill="#440000" opacity="0.6"/>
  <circle cx="517" cy="62" r="4" fill="#220000" opacity="0.6"/>
  <text x="672" y="67" text-anchor="middle" font-family="monospace" font-size="9" fill="#440000">requirements.txt</text>

  <!-- Requirements content — all visible immediately -->
  <g transform="translate(485, 84)">
    <text x="0"   y="18" font-family="'Courier New', monospace" font-size="12" fill="#ff4444">psutil&gt;=5.9.0</text>
    <text x="185" y="18" font-family="'Courier New', monospace" font-size="10" fill="#444444">← process enumeration</text>

    <text x="0"   y="38" font-family="'Courier New', monospace" font-size="12" fill="#ff4444">requests&gt;=2.28.0</text>
    <text x="185" y="38" font-family="'Courier New', monospace" font-size="10" fill="#444444">← API HTTP calls</text>

    <text x="0"   y="58" font-family="'Courier New', monospace" font-size="12" fill="#ff4444">reportlab&gt;=4.0.0</text>
    <text x="185" y="58" font-family="'Courier New', monospace" font-size="10" fill="#444444">← PDF generation</text>

    <text x="0"   y="78" font-family="'Courier New', monospace" font-size="12" fill="#ff4444">yara-python&gt;=4.3.0</text>
    <text x="185" y="78" font-family="'Courier New', monospace" font-size="10" fill="#444444">← YARA scanning</text>

    <line x1="0" y1="96" x2="360" y2="96" stroke="#220000" stroke-width="1"/>

    <text x="0"   y="114" font-family="'Courier New', monospace" font-size="10" fill="#555555">tkinter</text>
    <text x="80"  y="114" font-family="'Courier New', monospace" font-size="10" fill="#333333">— bundled with Python (no pip needed)</text>

    <text x="0"   y="132" font-family="'Courier New', monospace" font-size="10" fill="#555555">ctypes</text>
    <text x="80"  y="132" font-family="'Courier New', monospace" font-size="10" fill="#333333">— bundled with Python (Windows only)</text>

    <text x="0"   y="150" font-family="'Courier New', monospace" font-size="10" fill="#555555">hashlib</text>
    <text x="80"  y="150" font-family="'Courier New', monospace" font-size="10" fill="#333333">— stdlib, no install</text>

    <text x="0"   y="168" font-family="'Courier New', monospace" font-size="10" fill="#555555">concurrent.futures</text>
    <text x="185" y="168" font-family="'Courier New', monospace" font-size="10" fill="#333333">— stdlib, no install</text>
  </g>
</svg>
