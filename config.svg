<svg viewBox="0 0 900 378" xmlns="http://www.w3.org/2000/svg" width="900" height="378">
  <defs>
    <radialGradient id="cBg" cx="50%" cy="40%" r="80%">
      <stop offset="0%" stop-color="#0a0000"/>
      <stop offset="100%" stop-color="#000000"/>
    </radialGradient>
    <filter id="cGlow">
      <feGaussianBlur stdDeviation="2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="900" height="378" fill="url(#cBg)"/>

  <!-- Scanline -->
  <rect x="0" y="0" width="900" height="1.5" fill="#ff0000" opacity="0.07">
    <animateTransform attributeName="transform" type="translate" values="0,0;0,378;0,0" dur="6s" repeatCount="indefinite"/>
  </rect>

  <!-- Section header -->
  <rect x="0" y="0" width="900" height="38" fill="#0d0000"/>
  <line x1="0" y1="38" x2="900" y2="38" stroke="#cc0000" stroke-width="1" opacity="0.6"/>
  <text x="30" y="25" font-family="'Courier New', monospace" font-size="16" font-weight="bold" fill="#ff2200" filter="url(#cGlow)">▸ CONFIGURATION</text>
  <circle cx="16" cy="19" r="4" fill="#ff2200">
    <animate attributeName="opacity" values="1;0.2;1" dur="1.5s" repeatCount="indefinite"/>
  </circle>

  <!-- Left panel: API Keys -->
  <text x="30" y="65" font-family="'Courier New', monospace" font-size="12" fill="#cc0000" font-weight="bold">API KEYS  —  Settings Tab</text>

  <rect x="30" y="72" width="415" height="150" rx="5" fill="#060000" stroke="#330000" stroke-width="1"/>

  <!-- VirusTotal -->
  <text x="48" y="96" font-family="'Courier New', monospace" font-size="11" fill="#888888">VirusTotal API Key</text>
  <rect x="48" y="102" width="370" height="16" rx="2" fill="#110000" stroke="#440000" stroke-width="1"/>
  <text x="56" y="114" font-family="'Courier New', monospace" font-size="10" fill="#cc2222">●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●</text>
  <rect x="394" y="104" width="6" height="11" fill="#cc0000">
    <animate attributeName="opacity" values="1;0;1" dur="1.1s" repeatCount="indefinite"/>
  </rect>

  <!-- MalwareBazaar -->
  <text x="48" y="134" font-family="'Courier New', monospace" font-size="11" fill="#888888">MalwareBazaar Key  <tspan fill="#444444">(optional)</tspan></text>
  <rect x="48" y="140" width="370" height="16" rx="2" fill="#110000" stroke="#330000" stroke-width="1"/>
  <text x="56" y="152" font-family="'Courier New', monospace" font-size="10" fill="#441111">[ not configured ]</text>

  <!-- ThreatFox -->
  <text x="48" y="172" font-family="'Courier New', monospace" font-size="11" fill="#888888">ThreatFox Key  <tspan fill="#444444">(optional)</tspan></text>
  <rect x="48" y="178" width="370" height="16" rx="2" fill="#110000" stroke="#330000" stroke-width="1"/>
  <text x="56" y="190" font-family="'Courier New', monospace" font-size="10" fill="#441111">[ not configured ]</text>

  <!-- Note inside panel -->
  <text x="48" y="213" font-family="'Courier New', monospace" font-size="9" fill="#333333">Keys stored locally — never transmitted except to their respective APIs.</text>

  <!-- Right panel: Offline Mode -->
  <text x="465" y="65" font-family="'Courier New', monospace" font-size="12" fill="#cc0000" font-weight="bold">OFFLINE / AIR-GAP MODE</text>

  <rect x="465" y="72" width="415" height="150" rx="5" fill="#060000" stroke="#330000" stroke-width="1"/>

  <g transform="translate(483, 88)">
    <text x="0" y="12" font-family="'Courier New', monospace" font-size="11" fill="#ff4444">▸</text>
    <text x="14" y="12" font-family="'Courier New', monospace" font-size="11" fill="#cccccc">Threat Feed</text>
    <text x="130" y="12" font-family="'Courier New', monospace" font-size="10" fill="#555555">→  CSV with known-bad hashes</text>

    <text x="0" y="34" font-family="'Courier New', monospace" font-size="11" fill="#ff4444">▸</text>
    <text x="14" y="34" font-family="'Courier New', monospace" font-size="11" fill="#cccccc">Hash Database</text>
    <text x="144" y="34" font-family="'Courier New', monospace" font-size="10" fill="#555555">→  flat file or SQLite DB</text>

    <text x="0" y="56" font-family="'Courier New', monospace" font-size="11" fill="#ff4444">▸</text>
    <text x="14" y="56" font-family="'Courier New', monospace" font-size="11" fill="#cccccc">YARA Rules</text>
    <text x="118" y="56" font-family="'Courier New', monospace" font-size="10" fill="#555555">→  .yar / .yara file or dir</text>

    <text x="0" y="78" font-family="'Courier New', monospace" font-size="11" fill="#ff4444">▸</text>
    <text x="14" y="78" font-family="'Courier New', monospace" font-size="11" fill="#cccccc">ClamAV</text>
    <text x="82" y="78" font-family="'Courier New', monospace" font-size="10" fill="#555555">→  path to clamscan executable</text>

    <text x="0" y="100" font-family="'Courier New', monospace" font-size="11" fill="#ff4444">▸</text>
    <text x="14" y="100" font-family="'Courier New', monospace" font-size="11" fill="#cccccc">SQLite IOC DB</text>
    <text x="154" y="100" font-family="'Courier New', monospace" font-size="10" fill="#555555">→  .db / .sqlite malicious hashes</text>
  </g>

  <!-- Config file location -->
  <text x="30" y="244" font-family="'Courier New', monospace" font-size="12" fill="#cc0000" font-weight="bold">CONFIG FILE LOCATION</text>
  <rect x="30" y="252" width="840" height="40" rx="4" fill="#060000" stroke="#330000" stroke-width="1"/>
  <text x="48" y="270" font-family="'Courier New', monospace" font-size="11" fill="#666666">API keys, theme, accent color, offline paths:</text>
  <text x="48" y="286" font-family="'Courier New', monospace" font-size="11" fill="#ff4444">~/.suspicious_process_scanner/ui_config.json</text>

  <!-- Baseline note -->
  <text x="30" y="312" font-family="'Courier New', monospace" font-size="12" fill="#cc0000" font-weight="bold">BASELINE FILE</text>
  <rect x="30" y="320" width="840" height="40" rx="4" fill="#060000" stroke="#330000" stroke-width="1"/>
  <text x="48" y="338" font-family="'Courier New', monospace" font-size="11" fill="#666666">Known-clean hash store for drift detection:</text>
  <text x="48" y="354" font-family="'Courier New', monospace" font-size="11" fill="#ff4444">~/.suspicious_process_scanner/baseline.json</text>
</svg>
