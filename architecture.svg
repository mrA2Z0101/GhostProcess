<svg viewBox="0 0 900 420" xmlns="http://www.w3.org/2000/svg" width="900" height="420">
  <defs>
    <radialGradient id="aBg" cx="50%" cy="40%" r="80%">
      <stop offset="0%" stop-color="#0a0000"/>
      <stop offset="100%" stop-color="#000000"/>
    </radialGradient>
    <filter id="aGlow">
      <feGaussianBlur stdDeviation="2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="nodeGlow">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#cc0000" opacity="0.7"/>
    </marker>
  </defs>

  <rect width="900" height="420" fill="url(#aBg)"/>

  <!-- Scanline -->
  <rect x="0" y="0" width="900" height="1.5" fill="#ff0000" opacity="0.07">
    <animateTransform attributeName="transform" type="translate" values="0,0;0,420;0,0" dur="7s" repeatCount="indefinite"/>
  </rect>

  <!-- Section header -->
  <rect x="0" y="0" width="900" height="38" fill="#0d0000"/>
  <line x1="0" y1="38" x2="900" y2="38" stroke="#cc0000" stroke-width="1" opacity="0.6"/>
  <text x="30" y="25" font-family="'Courier New', monospace" font-size="16" font-weight="bold" fill="#ff2200" filter="url(#aGlow)">▸ HOW IT WORKS</text>
  <circle cx="16" cy="19" r="4" fill="#ff2200">
    <animate attributeName="opacity" values="1;0.2;1" dur="1.5s" repeatCount="indefinite"/>
  </circle>

  <!-- NODE 1: Running Processes -->
  <rect x="330" y="52" width="240" height="40" rx="5" fill="#150000" stroke="#880000" stroke-width="1.5" filter="url(#nodeGlow)">
    <animate attributeName="stroke" values="#880000;#cc0000;#880000" dur="3s" repeatCount="indefinite"/>
  </rect>
  <text x="450" y="77" text-anchor="middle" font-family="'Courier New', monospace" font-size="12" fill="#ff4444" font-weight="bold">Running Processes  (psutil)</text>

  <!-- Arrow 1 -->
  <line x1="450" y1="92" x2="450" y2="112" stroke="#cc0000" stroke-width="1.5" marker-end="url(#arr)" opacity="0.7"/>
  <!-- Animated pulse on arrow -->
  <circle r="3" fill="#ff2200">
    <animateMotion dur="2s" repeatCount="indefinite" path="M450,92 L450,112"/>
    <animate attributeName="opacity" values="0;1;0" dur="2s" repeatCount="indefinite"/>
  </circle>

  <!-- NODE 2: SHA-256 Hash -->
  <rect x="330" y="112" width="240" height="40" rx="5" fill="#150000" stroke="#880000" stroke-width="1.5"/>
  <text x="450" y="132" text-anchor="middle" font-family="'Courier New', monospace" font-size="12" fill="#ff4444">SHA-256 Hash</text>
  <text x="450" y="146" text-anchor="middle" font-family="'Courier New', monospace" font-size="9" fill="#666666">hash_cache · vt_cache lookup first</text>

  <!-- Cache branch (left) -->
  <line x1="330" y1="132" x2="220" y2="132" stroke="#440000" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arr)" opacity="0.5"/>
  <rect x="100" y="116" width="120" height="32" rx="3" fill="#0d0000" stroke="#330000" stroke-width="1"/>
  <text x="160" y="131" text-anchor="middle" font-family="'Courier New', monospace" font-size="9" fill="#888888">Cache Hit?</text>
  <text x="160" y="143" text-anchor="middle" font-family="'Courier New', monospace" font-size="9" fill="#555555">→ Return Cached</text>

  <!-- Arrow 2 -->
  <line x1="450" y1="152" x2="450" y2="172" stroke="#cc0000" stroke-width="1.5" marker-end="url(#arr)" opacity="0.7"/>
  <circle r="3" fill="#ff2200">
    <animateMotion dur="2s" begin="0.5s" repeatCount="indefinite" path="M450,152 L450,172"/>
    <animate attributeName="opacity" values="0;1;0" dur="2s" begin="0.5s" repeatCount="indefinite"/>
  </circle>

  <!-- NODE 3: Threat Intel box -->
  <rect x="60" y="172" width="780" height="100" rx="5" fill="#0a0000" stroke="#550000" stroke-width="1.5">
    <animate attributeName="stroke" values="#550000;#880000;#550000" dur="4s" repeatCount="indefinite"/>
  </rect>
  <text x="450" y="193" text-anchor="middle" font-family="'Courier New', monospace" font-size="12" fill="#cc0000" font-weight="bold">◈  Parallel Threat Intelligence Lookup</text>

  <!-- Intel source pills -->
  <rect x="80" y="200" width="96" height="22" rx="3" fill="#1a0000" stroke="#550000" stroke-width="1"/>
  <text x="128" y="215" text-anchor="middle" font-family="monospace" font-size="9" fill="#ff4444">VirusTotal</text>

  <rect x="188" y="200" width="106" height="22" rx="3" fill="#1a0000" stroke="#550000" stroke-width="1"/>
  <text x="241" y="215" text-anchor="middle" font-family="monospace" font-size="9" fill="#ff4444">MalwareBazaar</text>

  <rect x="306" y="200" width="88" height="22" rx="3" fill="#1a0000" stroke="#550000" stroke-width="1"/>
  <text x="350" y="215" text-anchor="middle" font-family="monospace" font-size="9" fill="#ff4444">ThreatFox</text>

  <rect x="406" y="200" width="80" height="22" rx="3" fill="#1a0000" stroke="#550000" stroke-width="1"/>
  <text x="446" y="215" text-anchor="middle" font-family="monospace" font-size="9" fill="#ff4444">Local CSV</text>

  <rect x="498" y="200" width="80" height="22" rx="3" fill="#1a0000" stroke="#550000" stroke-width="1"/>
  <text x="538" y="215" text-anchor="middle" font-family="monospace" font-size="9" fill="#ff4444">SQLite DB</text>

  <rect x="590" y="200" width="76" height="22" rx="3" fill="#1a0000" stroke="#550000" stroke-width="1"/>
  <text x="628" y="215" text-anchor="middle" font-family="monospace" font-size="9" fill="#ff4444">ClamAV</text>

  <rect x="678" y="200" width="86" height="22" rx="3" fill="#1a0000" stroke="#550000" stroke-width="1"/>
  <text x="721" y="215" text-anchor="middle" font-family="monospace" font-size="9" fill="#ff4444">YARA Rules</text>

  <rect x="80" y="232" width="88" height="22" rx="3" fill="#1a0000" stroke="#550000" stroke-width="1"/>
  <text x="124" y="247" text-anchor="middle" font-family="monospace" font-size="9" fill="#ff4444">Baseline</text>

  <rect x="180" y="232" width="88" height="22" rx="3" fill="#1a0000" stroke="#550000" stroke-width="1"/>
  <text x="224" y="247" text-anchor="middle" font-family="monospace" font-size="9" fill="#ff4444">WinTrust</text>

  <rect x="280" y="232" width="100" height="22" rx="3" fill="#1a0000" stroke="#550000" stroke-width="1"/>
  <text x="330" y="247" text-anchor="middle" font-family="monospace" font-size="9" fill="#ff4444">Publisher Info</text>

  <!-- Animated data packets flying between pills -->
  <circle r="2.5" fill="#ff2200" opacity="0.8">
    <animateMotion dur="3s" repeatCount="indefinite" path="M128,211 L241,211"/>
    <animate attributeName="opacity" values="0;1;0" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle r="2.5" fill="#ff2200" opacity="0.8">
    <animateMotion dur="3s" begin="1s" repeatCount="indefinite" path="M350,211 L446,211"/>
    <animate attributeName="opacity" values="0;1;0" dur="3s" begin="1s" repeatCount="indefinite"/>
  </circle>
  <circle r="2.5" fill="#ff2200" opacity="0.8">
    <animateMotion dur="3s" begin="2s" repeatCount="indefinite" path="M538,211 L628,211"/>
    <animate attributeName="opacity" values="0;1;0" dur="3s" begin="2s" repeatCount="indefinite"/>
  </circle>

  <!-- Arrow 3 -->
  <line x1="450" y1="272" x2="450" y2="292" stroke="#cc0000" stroke-width="1.5" marker-end="url(#arr)" opacity="0.7"/>
  <circle r="3" fill="#ff2200">
    <animateMotion dur="2s" begin="1s" repeatCount="indefinite" path="M450,272 L450,292"/>
    <animate attributeName="opacity" values="0;1;0" dur="2s" begin="1s" repeatCount="indefinite"/>
  </circle>

  <!-- NODE 4: Verdict -->
  <rect x="270" y="292" width="360" height="40" rx="5" fill="#150000" stroke="#880000" stroke-width="1.5"/>
  <text x="450" y="317" text-anchor="middle" font-family="'Courier New', monospace" font-size="12">
    <tspan fill="#00cc44">CLEAN</tspan><tspan fill="#666666">  /  </tspan><tspan fill="#ff2200">MALICIOUS</tspan><tspan fill="#666666">  /  </tspan><tspan fill="#ffaa00">UNKNOWN</tspan>
  </text>

  <!-- Arrow 4 -->
  <line x1="450" y1="332" x2="450" y2="352" stroke="#cc0000" stroke-width="1.5" marker-end="url(#arr)" opacity="0.7"/>
  <circle r="3" fill="#ff2200">
    <animateMotion dur="2s" begin="1.5s" repeatCount="indefinite" path="M450,332 L450,352"/>
    <animate attributeName="opacity" values="0;1;0" dur="2s" begin="1.5s" repeatCount="indefinite"/>
  </circle>

  <!-- NODE 5: Output pipeline -->
  <rect x="60" y="352" width="780" height="40" rx="5" fill="#0d0000" stroke="#440000" stroke-width="1"/>
  <text x="112" y="377" text-anchor="middle" font-family="'Courier New', monospace" font-size="10" fill="#ff4444">Risk Score</text>
  <text x="192" y="377" text-anchor="middle" font-family="'Courier New', monospace" font-size="10" fill="#440000">→</text>
  <text x="272" y="377" text-anchor="middle" font-family="'Courier New', monospace" font-size="10" fill="#ff4444">KPI Cards</text>
  <text x="352" y="377" text-anchor="middle" font-family="'Courier New', monospace" font-size="10" fill="#440000">→</text>
  <text x="450" y="377" text-anchor="middle" font-family="'Courier New', monospace" font-size="10" fill="#ff4444">Results Table</text>
  <text x="548" y="377" text-anchor="middle" font-family="'Courier New', monospace" font-size="10" fill="#440000">→</text>
  <text x="640" y="377" text-anchor="middle" font-family="'Courier New', monospace" font-size="10" fill="#ff4444">PDF Report</text>
  <text x="718" y="377" text-anchor="middle" font-family="'Courier New', monospace" font-size="10" fill="#440000">→</text>
  <text x="800" y="377" text-anchor="middle" font-family="'Courier New', monospace" font-size="10" fill="#ff4444">JSON/CSV</text>

  <!-- Animated flow across output bar -->
  <circle r="3" fill="#ff4444" opacity="0.7">
    <animateMotion dur="4s" repeatCount="indefinite" path="M60,372 L840,372"/>
    <animate attributeName="opacity" values="0;0.8;0" dur="4s" repeatCount="indefinite"/>
  </circle>
</svg>
