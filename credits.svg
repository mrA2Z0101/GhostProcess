<svg viewBox="0 0 900 160" xmlns="http://www.w3.org/2000/svg" width="900" height="160">
  <defs>
    <radialGradient id="crBg" cx="50%" cy="60%" r="70%">
      <stop offset="0%" stop-color="#1a0000"/>
      <stop offset="60%" stop-color="#0d0000"/>
      <stop offset="100%" stop-color="#000000"/>
    </radialGradient>
    <radialGradient id="crGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#cc0000" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
    <filter id="crTextGlow">
      <feGaussianBlur stdDeviation="2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="crClip"><rect width="900" height="160"/></clipPath>
  </defs>

  <rect width="900" height="160" fill="url(#crBg)"/>

  <!-- Background glow -->
  <ellipse cx="450" cy="90" rx="300" ry="60" fill="url(#crGlow)">
    <animate attributeName="rx" values="300;360;300" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.8;1;0.8" dur="4s" repeatCount="indefinite"/>
  </ellipse>

  <!-- Grid lines -->
  <g opacity="0.15" clip-path="url(#crClip)">
    <line x1="0" y1="160" x2="450" y2="100" stroke="#cc0000" stroke-width="0.5"/>
    <line x1="200" y1="160" x2="450" y2="100" stroke="#cc0000" stroke-width="0.5"/>
    <line x1="400" y1="160" x2="450" y2="100" stroke="#cc0000" stroke-width="0.5"/>
    <line x1="600" y1="160" x2="450" y2="100" stroke="#cc0000" stroke-width="0.5"/>
    <line x1="900" y1="160" x2="450" y2="100" stroke="#cc0000" stroke-width="0.5"/>
    <line x1="0" y1="145" x2="900" y2="145" stroke="#cc0000" stroke-width="0.4"/>
    <line x1="0" y1="130" x2="900" y2="130" stroke="#cc0000" stroke-width="0.3"/>
  </g>

  <!-- Top separator line -->
  <line x1="0" y1="1" x2="900" y2="1" stroke="#cc0000" stroke-width="1" opacity="0.5"/>

  <!-- Floating particles -->
  <circle cx="150" cy="60" r="1.5" fill="#ff2200">
    <animate attributeName="cy" values="60;30;60" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="1;0.2;1" dur="4s" repeatCount="indefinite"/>
  </circle>
  <circle cx="750" cy="50" r="1.5" fill="#ff2200">
    <animate attributeName="cy" values="50;20;50" dur="3.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.3;1;0.3" dur="3.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="300" cy="80" r="1" fill="#cc0000">
    <animate attributeName="cy" values="80;50;80" dur="5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.7;0.1;0.7" dur="5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="620" cy="70" r="1" fill="#cc0000">
    <animate attributeName="cy" values="70;40;70" dur="4.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.2;0.8;0.2" dur="4.5s" repeatCount="indefinite"/>
  </circle>

  <!-- Made by -->
  <text x="450" y="52" text-anchor="middle" font-family="'Courier New', monospace" font-size="12" fill="#666666" letter-spacing="3">MADE WITH ● BY</text>

  <!-- Brand name -->
  <text x="450" y="90" text-anchor="middle" font-family="'Courier New', monospace" font-size="28" font-weight="bold" fill="#ffffff" filter="url(#crTextGlow)" letter-spacing="2">Byte-Sized<tspan fill="#cc1111"> Wisdom</tspan></text>

  <!-- Tagline -->
  <text x="450" y="115" text-anchor="middle" font-family="'Courier New', monospace" font-size="12" fill="#cc2222" letter-spacing="1">"Know your processes. Know your system."</text>

  <!-- Scrolling bottom credit line -->
  <g clip-path="url(#crClip)">
    <text y="145" font-family="monospace" font-size="9" fill="#440000" opacity="0.8">
      <animateTransform attributeName="transform" type="translate" values="1000,0;-800,0" dur="35s" repeatCount="indefinite" calcMode="linear"/>
      GhostProcess v1.0.0  ·  Python 3.10+  ·  VirusTotal  ·  MalwareBazaar  ·  ThreatFox  ·  YARA  ·  ClamAV  ·  WinVerifyTrust  ·  ReportLab  ·  psutil  ·  ThreadPoolExecutor  ·  MIT License
    </text>
  </g>

  <!-- Bottom line -->
  <line x1="0" y1="159" x2="900" y2="159" stroke="#cc0000" stroke-width="1" opacity="0.3"/>
</svg>
