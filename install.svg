<svg viewBox="0 0 900 455" xmlns="http://www.w3.org/2000/svg" width="900" height="455">
  <defs>
    <radialGradient id="iBg2" cx="50%" cy="30%" r="80%">
      <stop offset="0%" stop-color="#0a0000"/>
      <stop offset="100%" stop-color="#000000"/>
    </radialGradient>
    <filter id="iG2">
      <feGaussianBlur stdDeviation="2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="900" height="455" fill="url(#iBg2)"/>

  <!-- Scanline -->
  <rect x="0" y="0" width="900" height="1.5" fill="#ff0000" opacity="0.07">
    <animateTransform attributeName="transform" type="translate" values="0,0;0,455;0,0" dur="7s" repeatCount="indefinite"/>
  </rect>

  <!-- Section header -->
  <rect x="0" y="0" width="900" height="38" fill="#0d0000"/>
  <line x1="0" y1="38" x2="900" y2="38" stroke="#cc0000" stroke-width="1" opacity="0.6"/>
  <text x="30" y="25" font-family="'Courier New', monospace" font-size="16" font-weight="bold" fill="#ff2200" filter="url(#iG2)">▸ INSTALLATION</text>
  <circle cx="16" cy="19" r="4" fill="#ff2200">
    <animate attributeName="opacity" values="1;0.2;1" dur="1.5s" repeatCount="indefinite"/>
  </circle>

  <!-- Prerequisites label -->
  <text x="30" y="65" font-family="'Courier New', monospace" font-size="12" fill="#cc0000" font-weight="bold">PREREQUISITES</text>

  <!-- Table header row -->
  <rect x="30" y="72" width="840" height="22" fill="#110000"/>
  <text x="40" y="87" font-family="'Courier New', monospace" font-size="10" fill="#880000" font-weight="bold">REQUIREMENT</text>
  <text x="300" y="87" font-family="'Courier New', monospace" font-size="10" fill="#880000" font-weight="bold">VERSION</text>

  <!-- Python row -->
  <rect x="30" y="94" width="840" height="22" fill="#080000"/>
  <text x="40" y="109" font-family="'Courier New', monospace" font-size="11" fill="#cccccc">Python</text>
  <text x="300" y="109" font-family="'Courier New', monospace" font-size="11" fill="#ff4444">3.10 or higher</text>

  <!-- pip row -->
  <rect x="30" y="116" width="840" height="22" fill="#050000"/>
  <text x="40" y="131" font-family="'Courier New', monospace" font-size="11" fill="#cccccc">pip</text>
  <text x="300" y="131" font-family="'Courier New', monospace" font-size="11" fill="#ff4444">Latest</text>

  <!-- VirusTotal row -->
  <rect x="30" y="138" width="840" height="22" fill="#080000"/>
  <text x="40" y="153" font-family="'Courier New', monospace" font-size="11" fill="#cccccc">VirusTotal API Key</text>
  <text x="300" y="153" font-family="'Courier New', monospace" font-size="11" fill="#ff4444">Free tier works</text>

  <!-- Quick Setup label -->
  <text x="30" y="183" font-family="'Courier New', monospace" font-size="12" fill="#cc0000" font-weight="bold">QUICK SETUP</text>

  <!-- Terminal window -->
  <rect x="30" y="190" width="840" height="205" rx="5" fill="#060000" stroke="#330000" stroke-width="1"/>

  <!-- Terminal title bar -->
  <rect x="30" y="190" width="840" height="22" rx="5" fill="#110000"/>
  <rect x="30" y="203" width="840" height="9" fill="#110000"/>
  <circle cx="50" cy="201" r="4" fill="#cc0000" opacity="0.7"/>
  <circle cx="66" cy="201" r="4" fill="#440000" opacity="0.7"/>
  <circle cx="82" cy="201" r="4" fill="#220000" opacity="0.7"/>
  <text x="450" y="206" text-anchor="middle" font-family="monospace" font-size="9" fill="#440000">bash</text>

  <!-- Code lines — all static, no opacity animation -->
  <text x="50" y="232" font-family="'Courier New', monospace" font-size="11" fill="#666666"># 1. Clone the repository</text>
  <text x="50" y="250" font-family="'Courier New', monospace" font-size="11" fill="#ff4444">git clone https://github.com/YOUR_USERNAME/GhostProcess.git</text>
  <text x="50" y="266" font-family="'Courier New', monospace" font-size="11" fill="#ff4444">cd GhostProcess</text>

  <text x="50" y="288" font-family="'Courier New', monospace" font-size="11" fill="#666666"># 2. Install dependencies</text>
  <text x="50" y="306" font-family="'Courier New', monospace" font-size="11" fill="#ff4444">pip install psutil requests reportlab</text>
  <text x="50" y="322" font-family="'Courier New', monospace" font-size="11" fill="#ff4444">pip install yara-python  <tspan fill="#666666"># optional</tspan></text>

  <text x="50" y="344" font-family="'Courier New', monospace" font-size="11" fill="#666666"># 3. Launch</text>
  <text x="50" y="362" font-family="'Courier New', monospace" font-size="11" fill="#ff4444">python GhostProcess.py</text>

  <!-- Blinking cursor inside terminal -->
  <rect x="50" y="370" width="7" height="11" fill="#cc0000">
    <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/>
  </rect>

  <!-- WIN note -->
  <rect x="30" y="404" width="840" height="36" rx="3" fill="#0d0500" stroke="#442200" stroke-width="1"/>
  <text x="46" y="418" font-family="'Courier New', monospace" font-size="10" fill="#ff6600" font-weight="bold">[ WIN ]</text>
  <text x="100" y="418" font-family="'Courier New', monospace" font-size="10" fill="#888888">ctypes + wintrust.dll used automatically for Authenticode — no extra setup needed.</text>
  <text x="100" y="432" font-family="'Courier New', monospace" font-size="10" fill="#555555">tkinter is bundled with standard Python — no separate install required.</text>
</svg>
