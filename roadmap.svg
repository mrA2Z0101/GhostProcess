<svg viewBox="0 0 900 340" xmlns="http://www.w3.org/2000/svg" width="900" height="340">
  <defs>
    <radialGradient id="dBg" cx="50%" cy="40%" r="80%">
      <stop offset="0%" stop-color="#0a0000"/>
      <stop offset="100%" stop-color="#000000"/>
    </radialGradient>
    <filter id="dGlow">
      <feGaussianBlur stdDeviation="2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="900" height="340" fill="url(#dBg)"/>

  <!-- Scanline -->
  <rect x="0" y="0" width="900" height="1.5" fill="#ff0000" opacity="0.07">
    <animateTransform attributeName="transform" type="translate" values="0,0;0,340;0,0" dur="6s" repeatCount="indefinite"/>
  </rect>

  <!-- Section header -->
  <rect x="0" y="0" width="900" height="38" fill="#0d0000"/>
  <line x1="0" y1="38" x2="900" y2="38" stroke="#cc0000" stroke-width="1" opacity="0.6"/>
  <text x="30" y="25" font-family="'Courier New', monospace" font-size="16" font-weight="bold" fill="#ff2200" filter="url(#dGlow)">▸ DISCLAIMER  &amp;  ROADMAP</text>
  <circle cx="16" cy="19" r="4" fill="#ff2200">
    <animate attributeName="opacity" values="1;0.2;1" dur="1.5s" repeatCount="indefinite"/>
  </circle>

  <!-- Disclaimer box -->
  <rect x="30" y="50" width="840" height="80" rx="5" fill="#0d0000" stroke="#882200" stroke-width="1.5">
    <animate attributeName="stroke" values="#882200;#cc3300;#882200" dur="4s" repeatCount="indefinite"/>
  </rect>
  <!-- Warning triangle -->
  <polygon points="64,68 50,92 78,92" fill="none" stroke="#ff4400" stroke-width="1.5"/>
  <text x="64" y="88" text-anchor="middle" font-family="monospace" font-size="12" fill="#ff4400" font-weight="bold">!</text>

  <text x="94" y="70" font-family="'Courier New', monospace" font-size="11" fill="#ff6644" font-weight="bold">DEFENSIVE USE ONLY</text>
  <text x="94" y="88" font-family="'Courier New', monospace" font-size="10.5" fill="#aaaaaa">GhostProcess is intended for use on systems you own or have explicit authorization to analyze.</text>
  <text x="94" y="104" font-family="'Courier New', monospace" font-size="10.5" fill="#666666">Unauthorized scanning is illegal. VirusTotal, MalwareBazaar, and ThreatFox terms of service apply.</text>

  <!-- Roadmap -->
  <text x="30" y="158" font-family="'Courier New', monospace" font-size="12" fill="#cc0000" font-weight="bold">ROADMAP</text>
  <line x1="30" y1="165" x2="870" y2="165" stroke="#330000" stroke-width="1"/>

  <!-- Roadmap items with pulsing unchecked boxes -->
  <g transform="translate(30, 175)">

    <g>
      <rect x="0" y="0" width="14" height="14" rx="2" fill="#1a0000" stroke="#550000" stroke-width="1">
        <animate attributeName="stroke" values="#550000;#880000;#550000" dur="2.0s" repeatCount="indefinite"/>
      </rect>
      <text x="22" y="12" font-family="'Courier New', monospace" font-size="11" fill="#cccccc">Network connection inspection per-process</text>
      <text x="362" y="12" font-family="'Courier New', monospace" font-size="10" fill="#444444">  ← partially implemented</text>
    </g>

    <g transform="translate(0,24)">
      <rect x="0" y="0" width="14" height="14" rx="2" fill="#1a0000" stroke="#550000" stroke-width="1">
        <animate attributeName="stroke" values="#550000;#880000;#550000" dur="2.4s" repeatCount="indefinite"/>
      </rect>
      <text x="22" y="12" font-family="'Courier New', monospace" font-size="11" fill="#cccccc">VirusTotal file submission for unknown hashes</text>
    </g>

    <g transform="translate(0,48)">
      <rect x="0" y="0" width="14" height="14" rx="2" fill="#1a0000" stroke="#550000" stroke-width="1">
        <animate attributeName="stroke" values="#550000;#880000;#550000" dur="1.8s" repeatCount="indefinite"/>
      </rect>
      <text x="22" y="12" font-family="'Courier New', monospace" font-size="11" fill="#cccccc">Scheduled / recurring scans</text>
    </g>

    <g transform="translate(0,72)">
      <rect x="0" y="0" width="14" height="14" rx="2" fill="#1a0000" stroke="#550000" stroke-width="1">
        <animate attributeName="stroke" values="#550000;#880000;#550000" dur="2.2s" repeatCount="indefinite"/>
      </rect>
      <text x="22" y="12" font-family="'Courier New', monospace" font-size="11" fill="#cccccc">Tray icon for persistent background monitoring</text>
    </g>

    <g transform="translate(0,96)">
      <rect x="0" y="0" width="14" height="14" rx="2" fill="#1a0000" stroke="#550000" stroke-width="1">
        <animate attributeName="stroke" values="#550000;#880000;#550000" dur="3.0s" repeatCount="indefinite"/>
      </rect>
      <text x="22" y="12" font-family="'Courier New', monospace" font-size="11" fill="#cccccc">Plugin system for custom intelligence sources</text>
    </g>

    <g transform="translate(0,120)">
      <rect x="0" y="0" width="14" height="14" rx="2" fill="#1a0000" stroke="#550000" stroke-width="1">
        <animate attributeName="stroke" values="#550000;#880000;#550000" dur="2.6s" repeatCount="indefinite"/>
      </rect>
      <text x="22" y="12" font-family="'Courier New', monospace" font-size="11" fill="#cccccc">Electron / web UI port</text>
    </g>

  </g>
</svg>
