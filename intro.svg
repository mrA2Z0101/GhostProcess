<svg viewBox="0 0 900 160" xmlns="http://www.w3.org/2000/svg" width="900" height="160">
  <defs>
    <radialGradient id="iBg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#110000"/>
      <stop offset="100%" stop-color="#000000"/>
    </radialGradient>
    <filter id="iGlow">
      <feGaussianBlur stdDeviation="2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="iClip"><rect width="900" height="160"/></clipPath>
  </defs>

  <rect width="900" height="160" fill="url(#iBg)"/>

  <!-- Scanline overlay -->
  <rect x="0" y="0" width="900" height="1.5" fill="#ff0000" opacity="0.08">
    <animateTransform attributeName="transform" type="translate" values="0,0;0,160;0,0" dur="6s" repeatCount="indefinite"/>
  </rect>

  <!-- Badge row -->
  <!-- Python badge -->
  <g transform="translate(80,20)">
    <rect x="-70" y="0" width="140" height="28" rx="4" fill="#1a0000" stroke="#8B0000" stroke-width="1"/>
    <rect x="-70" y="0" width="52" height="28" rx="4" fill="#8B0000"/>
    <rect x="-18" y="0" width="2" height="28" fill="#8B0000"/>
    <text x="-44" y="19" font-family="monospace" font-size="11" fill="#ffffff" font-weight="bold" text-anchor="middle">Python</text>
    <text x="34" y="19" font-family="monospace" font-size="11" fill="#ff4444" text-anchor="middle">3.10+</text>
    <animate attributeName="opacity" values="1;0.7;1" dur="4s" repeatCount="indefinite"/>
  </g>

  <!-- Platform badge -->
  <g transform="translate(250,20)">
    <rect x="-80" y="0" width="160" height="28" rx="4" fill="#1a0000" stroke="#8B0000" stroke-width="1"/>
    <rect x="-80" y="0" width="60" height="28" rx="4" fill="#8B0000"/>
    <rect x="-20" y="0" width="2" height="28" fill="#8B0000"/>
    <text x="-50" y="19" font-family="monospace" font-size="11" fill="#ffffff" font-weight="bold" text-anchor="middle">Platform</text>
    <text x="48" y="19" font-family="monospace" font-size="9" fill="#ff4444" text-anchor="middle">Win/Lin/Mac</text>
    <animate attributeName="opacity" values="0.7;1;0.7" dur="4s" repeatCount="indefinite"/>
  </g>

  <!-- VirusTotal badge -->
  <g transform="translate(430,20)">
    <rect x="-80" y="0" width="160" height="28" rx="4" fill="#1a0000" stroke="#8B0000" stroke-width="1"/>
    <rect x="-80" y="0" width="70" height="28" rx="4" fill="#8B0000"/>
    <rect x="-10" y="0" width="2" height="28" fill="#8B0000"/>
    <text x="-45" y="19" font-family="monospace" font-size="10" fill="#ffffff" font-weight="bold" text-anchor="middle">VirusTotal</text>
    <text x="55" y="19" font-family="monospace" font-size="9" fill="#ff4444" text-anchor="middle">Integrated</text>
    <animate attributeName="opacity" values="1;0.7;1" dur="5s" repeatCount="indefinite"/>
  </g>

  <!-- License badge -->
  <g transform="translate(600,20)">
    <rect x="-65" y="0" width="130" height="28" rx="4" fill="#1a0000" stroke="#8B0000" stroke-width="1"/>
    <rect x="-65" y="0" width="50" height="28" rx="4" fill="#8B0000"/>
    <rect x="-15" y="0" width="2" height="28" fill="#8B0000"/>
    <text x="-40" y="19" font-family="monospace" font-size="11" fill="#ffffff" font-weight="bold" text-anchor="middle">License</text>
    <text x="40" y="19" font-family="monospace" font-size="11" fill="#ff4444" text-anchor="middle">MIT</text>
    <animate attributeName="opacity" values="0.7;1;0.7" dur="3.5s" repeatCount="indefinite"/>
  </g>

  <!-- Version badge -->
  <g transform="translate(775,20)">
    <rect x="-65" y="0" width="130" height="28" rx="4" fill="#1a0000" stroke="#8B0000" stroke-width="1"/>
    <rect x="-65" y="0" width="52" height="28" rx="4" fill="#8B0000"/>
    <rect x="-13" y="0" width="2" height="28" fill="#8B0000"/>
    <text x="-39" y="19" font-family="monospace" font-size="11" fill="#ffffff" font-weight="bold" text-anchor="middle">Version</text>
    <text x="42" y="19" font-family="monospace" font-size="11" fill="#ff4444" text-anchor="middle">1.0.0</text>
    <animate attributeName="opacity" values="1;0.75;1" dur="4.5s" repeatCount="indefinite"/>
  </g>

  <!-- Separator line -->
  <line x1="60" y1="64" x2="840" y2="64" stroke="#cc0000" stroke-width="0.6" opacity="0.4"/>

  <!-- Description text — line 1 -->
  <text x="450" y="90" text-anchor="middle" font-family="'Courier New', monospace" font-size="13" fill="#dddddd" opacity="0">
    GhostProcess is a dark-themed GUI process scanner that hunts malicious executables hiding in memory.
    <animate attributeName="opacity" values="0;0;1" dur="1.2s" fill="freeze" begin="0.3s"/>
  </text>
  <!-- Description text — line 2 -->
  <text x="450" y="112" text-anchor="middle" font-family="'Courier New', monospace" font-size="13" fill="#aaaaaa" opacity="0">
    SHA-256 hashing · live threat intel APIs · YARA rules · slick Tkinter dashboard.
    <animate attributeName="opacity" values="0;0;1" dur="1.2s" fill="freeze" begin="0.9s"/>
  </text>
  <!-- Description text — line 3 -->
  <text x="450" y="134" text-anchor="middle" font-family="'Courier New', monospace" font-size="12" fill="#cc2222" opacity="0">
    Suspects can be terminated, quarantined, and exported to PDF · JSON · CSV in one click.
    <animate attributeName="opacity" values="0;0;1" dur="1.2s" fill="freeze" begin="1.5s"/>
  </text>
</svg>
