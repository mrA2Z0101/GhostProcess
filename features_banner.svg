<svg viewBox="0 0 900 60" xmlns="http://www.w3.org/2000/svg" width="900" height="60">
  <defs>
    <linearGradient id="stripBg" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#000000"/>
      <stop offset="15%" stop-color="#0d0000"/>
      <stop offset="50%" stop-color="#1a0000"/>
      <stop offset="85%" stop-color="#0d0000"/>
      <stop offset="100%" stop-color="#000000"/>
    </linearGradient>
    <filter id="glow2">
      <feGaussianBlur stdDeviation="2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="stripClip">
      <rect width="900" height="60"/>
    </clipPath>
  </defs>

  <rect width="900" height="60" fill="url(#stripBg)"/>

  <!-- Top/bottom border lines -->
  <line x1="0" y1="1" x2="900" y2="1" stroke="#cc0000" stroke-width="1" opacity="0.5"/>
  <line x1="0" y1="59" x2="900" y2="59" stroke="#cc0000" stroke-width="1" opacity="0.5"/>

  <!-- Animated left-to-right scanning line -->
  <rect x="-20" y="0" width="20" height="60" fill="#ff0000" opacity="0.05">
    <animateTransform attributeName="transform" type="translate" values="-20,0;920,0" dur="3s" repeatCount="indefinite"/>
  </rect>

  <!-- Scrolling feature tags -->
  <g clip-path="url(#stripClip)" filter="url(#glow2)">
    <text y="36" font-family="'Courier New', monospace" font-size="12" fill="#ff2200" letter-spacing="1">
      <animateTransform attributeName="transform" type="translate" values="900,0;-2600,0" dur="18s" repeatCount="indefinite" calcMode="linear"/>
      ◈  VirusTotal API  ●  SHA-256 Hashing  ●  Live Monitoring  ●  YARA Rules  ●  ClamAV Integration  ●  Authenticode Verify  ●  MalwareBazaar  ●  ThreatFox  ●  PDF Reports  ●  Baseline Drift Detection  ●  JSON/CSV Export  ●  Kill Process  ●  SQLite IOC DB  ●  Offline Mode  ●  Process Tree  ◈
    </text>
  </g>

  <!-- Pulsing dots on sides -->
  <circle cx="10" cy="30" r="3" fill="#ff2200">
    <animate attributeName="opacity" values="1;0.2;1" dur="1.8s" repeatCount="indefinite"/>
  </circle>
  <circle cx="890" cy="30" r="3" fill="#ff2200">
    <animate attributeName="opacity" values="0.2;1;0.2" dur="1.8s" repeatCount="indefinite"/>
  </circle>
  <circle cx="25" cy="30" r="1.5" fill="#cc0000">
    <animate attributeName="opacity" values="0.5;1;0.5" dur="2.2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="875" cy="30" r="1.5" fill="#cc0000">
    <animate attributeName="opacity" values="1;0.3;1" dur="2.2s" repeatCount="indefinite"/>
  </circle>
</svg>
