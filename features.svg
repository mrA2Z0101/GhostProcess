<svg viewBox="0 0 900 520" xmlns="http://www.w3.org/2000/svg" width="900" height="520">
  <defs>
    <radialGradient id="fBg" cx="50%" cy="30%" r="80%">
      <stop offset="0%" stop-color="#0d0000"/>
      <stop offset="100%" stop-color="#000000"/>
    </radialGradient>
    <filter id="fGlow">
      <feGaussianBlur stdDeviation="2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="cardGlow">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="900" height="520" fill="url(#fBg)"/>

  <!-- Scanline -->
  <rect x="0" y="0" width="900" height="1.5" fill="#ff0000" opacity="0.07">
    <animateTransform attributeName="transform" type="translate" values="0,0;0,520;0,0" dur="7s" repeatCount="indefinite"/>
  </rect>

  <!-- Section header -->
  <rect x="0" y="0" width="900" height="38" fill="#0d0000"/>
  <line x1="0" y1="38" x2="900" y2="38" stroke="#cc0000" stroke-width="1" opacity="0.6"/>
  <text x="30" y="25" font-family="'Courier New', monospace" font-size="16" font-weight="bold" fill="#ff2200" filter="url(#fGlow)">▸ FEATURES</text>
  <circle cx="16" cy="19" r="4" fill="#ff2200">
    <animate attributeName="opacity" values="1;0.2;1" dur="1.5s" repeatCount="indefinite"/>
  </circle>

  <!-- ═══ CARD 1: Threat Intelligence (top-left) ═══ -->
  <g transform="translate(20,50)">
    <rect width="415" height="210" rx="5" fill="#0a0000" stroke="#550000" stroke-width="1.2">
      <animate attributeName="stroke" values="#550000;#880000;#550000" dur="4s" repeatCount="indefinite"/>
    </rect>
    <rect width="415" height="32" rx="5" fill="#1a0000"/>
    <rect y="25" width="415" height="7" fill="#1a0000"/>
    <text x="38" y="22" font-family="'Courier New', monospace" font-size="13" font-weight="bold" fill="#ff2200">◈  THREAT INTELLIGENCE</text>
    <circle cx="18" cy="16" r="5" fill="#cc0000" opacity="0.8">
      <animate attributeName="opacity" values="0.8;0.3;0.8" dur="2s" repeatCount="indefinite"/>
    </circle>
    <!-- Items -->
    <text x="18" y="58"  font-family="'Courier New', monospace" font-size="11" fill="#ff4444">▸</text>
    <text x="32" y="58"  font-family="'Courier New', monospace" font-size="11" fill="#cccccc">VirusTotal API</text>
    <text x="160" y="58" font-family="'Courier New', monospace" font-size="10" fill="#666666">— real-time SHA-256 reputation</text>

    <text x="18" y="78"  font-family="'Courier New', monospace" font-size="11" fill="#ff4444">▸</text>
    <text x="32" y="78"  font-family="'Courier New', monospace" font-size="11" fill="#cccccc">MalwareBazaar</text>
    <text x="170" y="78" font-family="'Courier New', monospace" font-size="10" fill="#666666">— Abuse.ch hash database</text>

    <text x="18" y="98"  font-family="'Courier New', monospace" font-size="11" fill="#ff4444">▸</text>
    <text x="32" y="98"  font-family="'Courier New', monospace" font-size="11" fill="#cccccc">ThreatFox</text>
    <text x="120" y="98" font-family="'Courier New', monospace" font-size="10" fill="#666666">— Abuse.ch IOC lookups</text>

    <text x="18" y="118" font-family="'Courier New', monospace" font-size="11" fill="#ff4444">▸</text>
    <text x="32" y="118" font-family="'Courier New', monospace" font-size="11" fill="#cccccc">Local Hash DB</text>
    <text x="160" y="118" font-family="'Courier New', monospace" font-size="10" fill="#666666">— flat file or SQLite IOC store</text>

    <text x="18" y="138" font-family="'Courier New', monospace" font-size="11" fill="#ff4444">▸</text>
    <text x="32" y="138" font-family="'Courier New', monospace" font-size="11" fill="#cccccc">Threat Feed CSV</text>
    <text x="178" y="138" font-family="'Courier New', monospace" font-size="10" fill="#666666">— custom indicator lists</text>

    <text x="18" y="158" font-family="'Courier New', monospace" font-size="11" fill="#ff4444">▸</text>
    <text x="32" y="158" font-family="'Courier New', monospace" font-size="11" fill="#cccccc">Offline Mode</text>
    <text x="148" y="158" font-family="'Courier New', monospace" font-size="10" fill="#666666">— fully air-gapped operation</text>

    <!-- Animated bottom border glow -->
    <rect y="205" width="415" height="2" rx="1" fill="#cc0000" opacity="0.3">
      <animate attributeName="opacity" values="0.3;0.7;0.3" dur="3s" repeatCount="indefinite"/>
      <animate attributeName="width" values="415;380;415" dur="3s" repeatCount="indefinite"/>
    </rect>
  </g>

  <!-- ═══ CARD 2: Static Analysis (top-right) ═══ -->
  <g transform="translate(465,50)">
    <rect width="415" height="210" rx="5" fill="#0a0000" stroke="#550000" stroke-width="1.2">
      <animate attributeName="stroke" values="#550000;#880000;#550000" dur="4.5s" repeatCount="indefinite"/>
    </rect>
    <rect width="415" height="32" rx="5" fill="#1a0000"/>
    <rect y="25" width="415" height="7" fill="#1a0000"/>
    <text x="38" y="22" font-family="'Courier New', monospace" font-size="13" font-weight="bold" fill="#ff2200">◈  STATIC ANALYSIS</text>
    <circle cx="18" cy="16" r="5" fill="#cc0000" opacity="0.8">
      <animate attributeName="opacity" values="0.3;0.8;0.3" dur="2.3s" repeatCount="indefinite"/>
    </circle>

    <text x="18" y="58"  font-family="'Courier New', monospace" font-size="11" fill="#ff4444">▸</text>
    <text x="32" y="58"  font-family="'Courier New', monospace" font-size="11" fill="#cccccc">SHA-256 Hashing</text>
    <text x="188" y="58" font-family="'Courier New', monospace" font-size="10" fill="#666666">— every process binary</text>

    <text x="18" y="78"  font-family="'Courier New', monospace" font-size="11" fill="#ff4444">▸</text>
    <text x="32" y="78"  font-family="'Courier New', monospace" font-size="11" fill="#cccccc">YARA Rules</text>
    <text x="140" y="78" font-family="'Courier New', monospace" font-size="10" fill="#666666">— rule files or directories</text>

    <text x="18" y="98"  font-family="'Courier New', monospace" font-size="11" fill="#ff4444">▸</text>
    <text x="32" y="98"  font-family="'Courier New', monospace" font-size="11" fill="#cccccc">ClamAV Integration</text>
    <text x="212" y="98" font-family="'Courier New', monospace" font-size="10" fill="#666666">— clamscan per executable</text>

    <text x="18" y="118" font-family="'Courier New', monospace" font-size="11" fill="#ff4444">▸</text>
    <text x="32" y="118" font-family="'Courier New', monospace" font-size="11" fill="#cccccc">Authenticode Verify</text>
    <text x="218" y="118" font-family="'Courier New', monospace" font-size="10" fill="#666666">— WinVerifyTrust (Windows)</text>

    <text x="18" y="138" font-family="'Courier New', monospace" font-size="11" fill="#ff4444">▸</text>
    <text x="32" y="138" font-family="'Courier New', monospace" font-size="11" fill="#cccccc">Publisher Extraction</text>
    <text x="220" y="138" font-family="'Courier New', monospace" font-size="10" fill="#666666">— CompanyName from version</text>

    <rect y="205" width="415" height="2" rx="1" fill="#cc0000" opacity="0.3">
      <animate attributeName="opacity" values="0.7;0.3;0.7" dur="3.5s" repeatCount="indefinite"/>
      <animate attributeName="width" values="380;415;380" dur="3.5s" repeatCount="indefinite"/>
    </rect>
  </g>

  <!-- ═══ CARD 3: Live Operations (bottom-left) ═══ -->
  <g transform="translate(20,280)">
    <rect width="415" height="220" rx="5" fill="#0a0000" stroke="#550000" stroke-width="1.2">
      <animate attributeName="stroke" values="#880000;#550000;#880000" dur="3.8s" repeatCount="indefinite"/>
    </rect>
    <rect width="415" height="32" rx="5" fill="#1a0000"/>
    <rect y="25" width="415" height="7" fill="#1a0000"/>
    <text x="38" y="22" font-family="'Courier New', monospace" font-size="13" font-weight="bold" fill="#ff2200">◈  LIVE OPERATIONS</text>
    <!-- Live pulse dot -->
    <circle cx="18" cy="16" r="5" fill="#ff0000">
      <animate attributeName="r" values="5;7;5" dur="1s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="1;0.4;1" dur="1s" repeatCount="indefinite"/>
    </circle>

    <text x="18" y="58"  font-family="'Courier New', monospace" font-size="11" fill="#ff4444">▸</text>
    <text x="32" y="58"  font-family="'Courier New', monospace" font-size="11" fill="#cccccc">Live Process Monitor</text>
    <text x="230" y="58" font-family="'Courier New', monospace" font-size="10" fill="#666666">— polls every 2 seconds</text>

    <text x="18" y="78"  font-family="'Courier New', monospace" font-size="11" fill="#ff4444">▸</text>
    <text x="32" y="78"  font-family="'Courier New', monospace" font-size="11" fill="#cccccc">Baseline Drift Detection</text>
    <text x="262" y="78" font-family="'Courier New', monospace" font-size="10" fill="#666666">— flags new/changed hashes</text>

    <text x="18" y="98"  font-family="'Courier New', monospace" font-size="11" fill="#ff4444">▸</text>
    <text x="32" y="98"  font-family="'Courier New', monospace" font-size="11" fill="#cccccc">Multi-threaded Scanning</text>
    <text x="256" y="98" font-family="'Courier New', monospace" font-size="10" fill="#666666">— ThreadPoolExecutor</text>

    <text x="18" y="118" font-family="'Courier New', monospace" font-size="11" fill="#ff4444">▸</text>
    <text x="32" y="118" font-family="'Courier New', monospace" font-size="11" fill="#cccccc">Hash &amp; VT Cache</text>
    <text x="178" y="118" font-family="'Courier New', monospace" font-size="10" fill="#666666">— no redundant disk/API calls</text>

    <text x="18" y="138" font-family="'Courier New', monospace" font-size="11" fill="#ff4444">▸</text>
    <text x="32" y="138" font-family="'Courier New', monospace" font-size="11" fill="#cccccc">Kill Process</text>
    <text x="145" y="138" font-family="'Courier New', monospace" font-size="10" fill="#666666">— terminate suspect PIDs</text>

    <text x="18" y="158" font-family="'Courier New', monospace" font-size="11" fill="#ff4444">▸</text>
    <text x="32" y="158" font-family="'Courier New', monospace" font-size="11" fill="#cccccc">Rescan Selected</text>
    <text x="184" y="158" font-family="'Courier New', monospace" font-size="10" fill="#666666">— re-evaluate on demand</text>

    <rect y="215" width="415" height="2" rx="1" fill="#cc0000" opacity="0.3">
      <animate attributeName="opacity" values="0.3;0.8;0.3" dur="2s" repeatCount="indefinite"/>
    </rect>
  </g>

  <!-- ═══ CARD 4: Reporting (bottom-right) ═══ -->
  <g transform="translate(465,280)">
    <rect width="415" height="220" rx="5" fill="#0a0000" stroke="#550000" stroke-width="1.2">
      <animate attributeName="stroke" values="#550000;#880000;#550000" dur="5s" repeatCount="indefinite"/>
    </rect>
    <rect width="415" height="32" rx="5" fill="#1a0000"/>
    <rect y="25" width="415" height="7" fill="#1a0000"/>
    <text x="38" y="22" font-family="'Courier New', monospace" font-size="13" font-weight="bold" fill="#ff2200">◈  REPORTING &amp; EXPORT</text>
    <circle cx="18" cy="16" r="5" fill="#cc0000" opacity="0.8">
      <animate attributeName="opacity" values="0.4;0.9;0.4" dur="2.8s" repeatCount="indefinite"/>
    </circle>

    <text x="18" y="58"  font-family="'Courier New', monospace" font-size="11" fill="#ff4444">▸</text>
    <text x="32" y="58"  font-family="'Courier New', monospace" font-size="11" fill="#cccccc">PDF Reports</text>
    <text x="145" y="58" font-family="'Courier New', monospace" font-size="10" fill="#666666">— branded via ReportLab</text>

    <text x="18" y="78"  font-family="'Courier New', monospace" font-size="11" fill="#ff4444">▸</text>
    <text x="32" y="78"  font-family="'Courier New', monospace" font-size="11" fill="#cccccc">JSON Export</text>
    <text x="140" y="78" font-family="'Courier New', monospace" font-size="10" fill="#666666">— full structured result dump</text>

    <text x="18" y="98"  font-family="'Courier New', monospace" font-size="11" fill="#ff4444">▸</text>
    <text x="32" y="98"  font-family="'Courier New', monospace" font-size="11" fill="#cccccc">CSV Export</text>
    <text x="136" y="98" font-family="'Courier New', monospace" font-size="10" fill="#666666">— spreadsheet-ready records</text>

    <text x="18" y="118" font-family="'Courier New', monospace" font-size="11" fill="#ff4444">▸</text>
    <text x="32" y="118" font-family="'Courier New', monospace" font-size="11" fill="#cccccc">Copy SHA-256</text>
    <text x="162" y="118" font-family="'Courier New', monospace" font-size="10" fill="#666666">— clipboard for pivot</text>

    <text x="18" y="138" font-family="'Courier New', monospace" font-size="11" fill="#ff4444">▸</text>
    <text x="32" y="138" font-family="'Courier New', monospace" font-size="11" fill="#cccccc">Open File Location</text>
    <text x="212" y="138" font-family="'Courier New', monospace" font-size="10" fill="#666666">— jump to binary on disk</text>

    <text x="18" y="158" font-family="'Courier New', monospace" font-size="11" fill="#ff4444">▸</text>
    <text x="32" y="158" font-family="'Courier New', monospace" font-size="11" fill="#cccccc">Process Tree View</text>
    <text x="210" y="158" font-family="'Courier New', monospace" font-size="10" fill="#666666">— visual parent/child graph</text>

    <rect y="215" width="415" height="2" rx="1" fill="#cc0000" opacity="0.3">
      <animate attributeName="opacity" values="0.7;0.3;0.7" dur="4s" repeatCount="indefinite"/>
      <animate attributeName="width" values="415;390;415" dur="4s" repeatCount="indefinite"/>
    </rect>
  </g>
</svg>
